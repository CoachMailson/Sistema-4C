<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Periodization System</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #form { margin: 20px; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <div id="form">
        <h1>Training Periodization System</h1>
        <label for="duration">Training Duration (weeks): </label>
        <input type="number" id="duration" required min="1">
        <button id="submit">Calculate</button>
    </div>
    <div id="output"></div>
    <script>
        document.getElementById('submit').addEventListener('click', function() {
            var duration = parseInt(document.getElementById('duration').value);
            var outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';

            if (!duration || duration < 1) {
                outputDiv.innerHTML = 'Please enter a valid duration.';
                return;
            }

            var periodization = calculatePeriodization(duration);
            outputDiv.innerHTML = '<h2>Periodization Plan:</h2><pre>' + JSON.stringify(periodization, null, 2) + '</pre>';
        });

        function calculatePeriodization(weeks) {
            var phases = {
                "Preparation": Math.ceil(weeks * 0.3),
                "Competitive": Math.ceil(weeks * 0.5),
                "Transition": Math.ceil(weeks * 0.2)
            };
            return phases;
        }
    </script>
</body>
</html>
