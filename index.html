<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Periodização</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #222;
            padding: 10px;
            text-align: center;
        }
        .button {
            margin: 5px;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #444;
            border: none;
            color: white;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .card {
            border: 1px solid #444;
            margin: 10px;
            padding: 20px;
            background-color: #222;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sistema de Periodização</h1>
        <button class="button" onclick="cadastrarCliente()">Cadastrar</button>
        <button class="button" onclick="carregarClientes()">Clientes</button>
    </header>
    <div class="container">
        <div class="card">
            <h2>Adicionar Cliente</h2>
            <label for="clientName">Nome do Cliente:</label>
            <input type="text" id="clientName">
            <label for="clientObjective">Objetivo:</label>
            <select id="clientObjective">
                <option value="emagrecimento">Emagrecimento</option>
                <option value="hipertrofia">Hipertrofia</option>
                <option value="enrijecimento">Enrijecimento</option>
                <option value="recomposicao">Recomposição</option>
                <option value="definicao">Definição</option>
            </select>
            <button class="button" onclick="salvarCliente()">Salvar Cliente</button>
        </div>
    </div>
    <script>
        function salvarCliente() {
            const name = document.getElementById('clientName').value;
            const objective = document.getElementById('clientObjective').value;
            // Save client to localStorage
            let clients = JSON.parse(localStorage.getItem('clients')) || [];
            clients.push({name, objective});
            localStorage.setItem('clients', JSON.stringify(clients));
            alert('Cliente salvo!');
        }

        function carregarClientes() {
            const clients = JSON.parse(localStorage.getItem('clients')) || [];
            if (clients.length === 0) {
                alert('Nenhum cliente encontrado.');
                return;
            }
            let clientList = 'Clientes:\n';
            clients.forEach((client, index) => {
                clientList += `${index + 1}. ${client.name} - ${client.objective}\n`;
            });
            alert(clientList);
        }

        function excluirCliente(index) {
            let clients = JSON.parse(localStorage.getItem('clients')) || [];
            clients.splice(index, 1);
            localStorage.setItem('clients', JSON.stringify(clients));
            alert('Cliente excluído!');
        }

        // Additional functions for training
        function salvarTreino(clienteIndex, treinoData) {
            // Save training data for a specific client
        }
    </script>
</body>
</html>
